name: Pipeline CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: nse_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8000:8000
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Set Environment Variables
      run: |
        echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
        echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
        echo "POSTGRES_DB=nse_db" >> $GITHUB_ENV
        echo "POSTGRES_USER=admin" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=admin_password" >> $GITHUB_ENV
        echo "POSTGRES_READONLY_USER=nse_reader" >> $GITHUB_ENV
        echo "POSTGRES_READONLY_PASSWORD=reader_password" >> $GITHUB_ENV
        echo "CHROMADB_HOST=localhost" >> $GITHUB_ENV
        echo "CHROMADB_PORT=8000" >> $GITHUB_ENV
        echo "NSE_SYMBOLS=RELIANCE.NS,TCS.NS,INFY.NS" >> $GITHUB_ENV
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Test with pytest
      run: |
        pytest -v tests/
        
