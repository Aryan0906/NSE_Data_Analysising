version: "3.9"

# ============================================================
# NSE Stock Market Pipeline — docker-compose.yml
# Rule 2: ChromaDB uses named volume + IS_PERSISTENT=TRUE
# Rule 5: Airflow depends_on postgres (db_init runs first)
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  environment:
    PYTHONPATH: /opt/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
    AIRFLOW__SMTP__SMTP_STARTTLS: "true"
    AIRFLOW__SMTP__SMTP_SSL: "false"
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-""}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-""}
    AIRFLOW__SMTP__SMTP_PORT: 587
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_USER:-noreply@nse-pipeline.local}
    # Pass-through env vars for pipeline code
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    CHROMADB_HOST: chromadb
    CHROMADB_PORT: 8000
    HF_API_TOKEN: ${HF_API_TOKEN}
  volumes:
    - ./backend/dags:/opt/airflow/dags
    - ./backend:/opt/airflow/backend
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ----------------------------------------------------------
  # PostgreSQL 15 — primary datastore (Rules 5, 6, 8)
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: nse_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # runs 01_schema.sql on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # ChromaDB — vector store (Rule 2: persistent volume)
  # IS_PERSISTENT must always be TRUE — never in-memory
  # ----------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: nse_chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      CHROMA_SERVER_HOST: "0.0.0.0"
      CHROMA_SERVER_HTTP_PORT: 8000
      ANONYMIZED_TELEMETRY: "False"
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma   # Rule 2: named volume, never tmpfs

  # ----------------------------------------------------------
  # Airflow initialiser — runs once, creates DB + admin user
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: nse_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
    restart: "no"

  # ----------------------------------------------------------
  # Airflow Webserver — UI on port 8080
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: nse_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # Airflow Scheduler — runs DAGs (Rule 5: task ordering)
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: nse_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

# ============================================================
# Named volumes — data outlives container restarts
# Rule 2 enforced: chromadb_data is a persistent Docker volume
# ============================================================
volumes:
  postgres_data:
    driver: local
  chromadb_data:
    driver: local
  airflow_plugins:
    driver: local
